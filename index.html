<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Gangorra contínua</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .cena {
      position: relative;
      width: 700px;
      height: 350px;
    }

    .sistema {
      position: absolute;
      left: 140px;
      top: 170px;
      width: 420px;
      height: 12px;
      transform-origin: center;
      animation: equilibrar 3s linear infinite;
    }

    .gangorra {
      width: 420px;
      height: 12px;
      background: white;
      border-radius: 10px;
    }

    .hexagono {
      position: absolute;
      width: 38px;
      height: 38px;
      background: white;
      top: -42px;

      clip-path: polygon(
        25% 0%,
        75% 0%,
        100% 50%,
        75% 100%,
        25% 100%,
        0% 50%
      );

      animation:
        deslizar 3s linear infinite,
        girar 0.6s linear infinite;
    }

    @keyframes equilibrar {
      0% {
        transform: translateX(85px) rotate(18deg);
      }
      25% {
        transform: translateX(0px) rotate(0deg);
      }
      50% {
        transform: translateX(-85px) rotate(-18deg);
      }
      75% {
        transform: translateX(0px) rotate(0deg);
      }
      100% {
        transform: translateX(85px) rotate(18deg);
      }
    }

    @keyframes deslizar {
      0% {
        left: 20px;
      }
      50% {
        left: 362px;
      }
      100% {
        left: 20px;
      }
    }

    @keyframes girar {
      from {
        rotate: 0deg;
      }
      to {
        rotate: 360deg;
      }
    }
  </style>
</head>

<body>
  <div class="cena">
    <div class="sistema">
      <div class="gangorra"></div>
      <div class="hexagono"></div>
    </div>
  </div>
</body>
</html>
