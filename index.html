<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gangorra contínua</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      background: #000;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .cena {
      position: relative;
      width: 700px;
      height: 350px;
    }

    .conjunto {
      position: absolute;
      width: 420px;
      height: 12px;
      left: 140px;
      top: 170px;
      transform-origin: center;
      animation: movimentoGangorra 3s linear infinite;
    }

    .barra {
      width: 100%;
      height: 100%;
      background: #fff;
      border-radius: 999px;
    }

    .peso {
      position: absolute;
      width: 38px;
      height: 38px;
      top: -42px;
      background: #fff;
      clip-path: polygon(
        25% 0%,
        75% 0%,
        100% 50%,
        75% 100%,
        25% 100%,
        0% 50%
      );
      animation:
        moverPeso 3s linear infinite,
        rotacionarPeso 0.6s linear infinite;
    }

    @keyframes movimentoGangorra {
      0%, 100% {
        transform: translateX(85px) rotate(18deg);
      }

      25%, 75% {
        transform: translateX(0) rotate(0deg);
      }

      50% {
        transform: translateX(-85px) rotate(-18deg);
      }
    }

    @keyframes moverPeso {
      0%, 100% {
        left: 20px;
      }

      50% {
        left: 362px;
      }
    }

    @keyframes rotacionarPeso {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="cena">
    <div class="conjunto">
      <div class="barra"></div>
      <div class="peso"></div>
    </div>
  </div>
</body>
</html>
